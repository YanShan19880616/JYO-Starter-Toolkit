                                <div className="absolute inset-[2px] border border-purple-400/30 rounded-sm"></div>
                                <div className="relative z-10 flex items-center justify-between py-2.5 px-3">
                                  <div className="flex items-center">
                                    <div className="text-purple-200 mr-2 border border-purple-400/30 p-1 rounded-sm bg-purple-950/50 shadow-inner">
                                      <BookOpenIcon size={18} />
                                    </div>
                                    <div className="text-left flex flex-col">
                                      <span className="text-[15px] font-bold text-purple-50 tracking-widest font-serif drop-shadow-md">
                                        卷三 · 扬州拜师
                                      </span>
                                      <span className="text-[10px] text-purple-300/80 font-serif tracking-wide">初窥门径习双龙</span>
                                    </div>
                                  </div>
                                  <div className="text-purple-300">
                                    {expandedCategory === 'yangzhou' ? <ChevronUpIcon size={20} /> : <ChevronDownIcon size={20} />}
                                  </div>
                                </div>
                              </button>
                              
                              {expandedCategory === 'yangzhou' && (
                                <div className="mt-4 px-2 py-1 animate-in fade-in duration-300">
                                  <WuxiaStep index={1} title="寻访武馆 (查看地图)" imageSrc="public/images/扬州武馆1 - 查看地图走到扬州武馆.png" />
                                  <WuxiaStep index={2} title="叩首拜师 (拜师汪龙)" imageSrc="public/images/扬州武馆2 - 拜师汪龙学武功.png" />
                                  <WuxiaStep index={3} title="应对考问 (对话选1)" imageSrc="public/images/扬州武馆3 - 拜师汪龙学武功对话选1.png" />
                                  <WuxiaStep index={4} title="束脩之礼 (交300金庸币)" imageSrc="public/images/扬州武馆4 - 拜师交300金庸币.png" />
                                  <WuxiaStep index={5} title="浏览绝学 (查看武功列表)" imageSrc="public/images/扬州武馆5 - 查看武功列表.png" />
                                  <WuxiaStep index={6} title="领悟招式 (双击习得双龙出海)" imageSrc="public/images/扬州武馆6 - 双击习得双龙出海.png" />
                                  <WuxiaStep index={7} title="勤加研习 (加学点至双龙出海)" imageSrc="public/images/扬州武馆7 - 右键学点全部加到双龙出海.png" />
                                  <WuxiaStep index={8} title="安营扎寨 (用帐篷睡一觉恢复)" imageSrc="public/images/扬州武馆8 - 发现精力没了右键身上的帐篷睡一觉满了.png" />
                                  <WuxiaStep index={9} title="内练一口气 (点数加基础内功)" imageSrc="public/images/扬州武馆9 - 剩余点数加到基础内功.png" />
                                  <WuxiaStep index={10} title="学成下山 (扬州武馆毕业)" imageSrc="public/images/扬州武馆10 - 扬州武馆毕业.png" />
                                </div>
                              )}
                            </div>

                            {/* 卷四：挂机打点 */}
                            <div>
                              <button
                                onClick={() => toggleCategory('afk')}
                                className="w-full relative overflow-hidden rounded-sm shadow-sm cursor-pointer transition-all duration-300 group border border-emerald-950"
                              >
                                <div className="absolute inset-0 bg-gradient-to-r from-emerald-900 via-teal-900 to-emerald-950"></div>
                                <div className="absolute inset-[2px] border border-emerald-400/30 rounded-sm"></div>
                                <div className="relative z-10 flex items-center justify-between py-2.5 px-3">
                                  <div className="flex items-center">
                                    <div className="text-emerald-200 mr-2 border border-emerald-400/30 p-1 rounded-sm bg-emerald-950/50 shadow-inner">
                                      <BookOpenIcon size={18} />
                                    </div>
                                    <div className="text-left flex flex-col">
                                      <span className="text-[15px] font-bold text-emerald-50 tracking-widest font-serif drop-shadow-md">
                                        卷四 · 闭关苦修
                                      </span>
                                      <span className="text-[10px] text-emerald-300/80 font-serif tracking-wide">自动挂机与打点</span>
                                    </div>
                                  </div>
                                  <div className="text-emerald-300">
                                    {expandedCategory === 'afk' ? <ChevronUpIcon size={20} /> : <ChevronDownIcon size={20} />}
                                  </div>
                                </div>
                              </button>
                              
                              {expandedCategory === 'afk' && (
                                <div className="mt-4 px-2 py-1 animate-in fade-in duration-300">
                                  <WuxiaStep index={1} title="游侠环境配置入口" imageSrc="public/images/游侠1环境设置入口.png" />
                                  <WuxiaStep index={2} title="环境设置-高级设置" imageSrc="public/images/游侠2环境设置高级设置.png" />
                                  <WuxiaStep index={3} title="打点设置入口" imageSrc="public/images/游侠3打点入口.png" />
                                  <WuxiaStep index={4} title="打点基本设置" imageSrc="public/images/游侠4打点基本设置.png" />
                                  <WuxiaStep index={5} title="打点进阶设置" imageSrc="public/images/游侠5打点进阶设置.png" />
                                  <WuxiaStep index={6} title="打点高级设置" imageSrc="public/images/游侠6打点高级设置.png" />
                                  <WuxiaStep index={7} title="打点捡拣宝设置" imageSrc="public/images/游侠7捡拣宝设置.png" />
                                  <WuxiaStep index={8} title="娱乐商城入口" imageSrc="public/images/游侠8娱乐商城入口.png" />
                                  
                                  {/* 提示：物品购买渠道 */}
                                  <div className="my-4 mx-1 p-3 bg-gradient-to-r from-amber-50 to-orange-50 border-l-4 border-amber-600 rounded-r shadow-sm">
                                    <div className="flex items-start">
                                      <div className="text-amber-600 mr-2 mt-0.5">
                                        <InfoIcon size={16} />
                                      </div>
                                      <div>
                                        <p className="text-sm text-amber-800 font-medium leading-relaxed">
                                          <span className="font-bold text-amber-900">💡 温馨提示：</span>
                                          以下物品可从<span className="text-amber-900 font-bold">其他玩家(商人)</span>处购买，请自行对比价格，择优而入。
                                        </p>
                                      </div>
                                    </div>
                                  </div>
                                  
                                  <WuxiaStep index={9} title="购买学点令牌" imageSrc="public/images/游侠9购买学点令牌.png" />
                                  <WuxiaStep index={10} title="购买记忆天书(空)" imageSrc="public/images/游侠10购买记忆天书(空).png" />
                                  <WuxiaStep index={11} title="购买网龙银票" imageSrc="public/images/游侠11购买网龙银票.png" />
                                  <WuxiaStep index={12} title="购买娃娃车" imageSrc="public/images/游侠12购买娃娃车.png" />
                                  <WuxiaStep index={13} title="购买负重袋" imageSrc="public/images/游侠13购买负重袋.png" />
                                  <WuxiaStep index={14} title="购买百纳袋" imageSrc="public/images/游侠14购买百纳袋.png" />
                                  <WuxiaStep index={15} title="找到已购买的学点金牌" imageSrc="public/images/游侠15内找到已购买的学点金牌.png" />
                                  <WuxiaStep index={16} title="使用学点金牌" imageSrc="public/images/游侠16内找到右键单击使用学点金牌.png" />
                                  <WuxiaStep index={17} title="启动打点" imageSrc="public/images/游侠17启动打点.png" />
                                  <WuxiaStep index={18} title="打点成功" imageSrc="public/images/游侠18打点成功.png" />
                                </div>
                              )}
                            </div>
                          </div>
                        )}

                        {day.id !== 1 && (
                           <div className="py-4 bg-[#fffdf8] border-2 border-dashed border-[#d4be9a] text-center rounded-sm">
                             <p className="text-sm text-amber-800 font-medium font-serif tracking-widest">
                               后续秘籍拼命中...
                             </p>
                           </div>
                        )}

                        {isCurrent && (
                          <button
                            onClick={(e) => {
                              e.stopPropagation();
                              if (unlockedDay < daysData.length) {
                                setUnlockedDay(unlockedDay + 1);
                                setViewingDay(unlockedDay + 1);
                              } else {
                                alert("恭喜大侠，神功大成，可出关矣！");
                              }
                            }}
                            className="w-full mt-5 py-3 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPgo8cmVjdCB3aWR0aD0iOCIgaGVpZ2h0PSI4IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDUiPjwvcmVjdD4KPHBhdGggZD0iTTAgMEw4IDhaTThgMExgOFoiIHN0cm9rZT0iI2ZmZiIgc3Ryb2tlLW9wYWNpdHk9IjAuMSIgc3Ryb2tlLXdpZHRoPSIxIj48L3BhdGg+Cjwvc3ZnPg==')] bg-red-900 text-[#f7f2e8] font-bold text-[15px] font-serif tracking-widest rounded-sm border-2 border-red-950 shadow-[2px_2px_0px_#450a0a] hover:translate-y-[1px] hover:shadow-[1px_1px_0px_#450a0a] active:translate-y-[2px] active:shadow-none transition-all flex items-center justify-center"
                          >
                            {unlockedDay < daysData.length ? "参透此卷，修炼下一日" : "神功大成，破关而出！"}
                          </button>
                        )}

                        {isCompleted && (
                          <div className="text-center text-sm text-emerald-800 font-bold mt-5 py-2 border-t border-b border-emerald-800/30 font-serif tracking-widest bg-emerald-50/50">
                            印：此卷已然勘破
                          </div>
                        )}
                      </div>
                    )}

                    {isLocked && (
                      <div className="mt-2.5 text-[10px] text-amber-900/40 flex items-center font-bold font-serif tracking-widest">
                        <LockIcon size={12} className="mr-1" /> 需前置心法方可解锁
                      </div>
                    )}
                  </div>
                </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function PlaceholderTab({ title, desc }) {
  return (
    <div className="flex flex-col items-center justify-center h-full p-6 text-center mt-20">
      <div className="w-16 h-16 bg-[#e8dcc7] rounded-full flex items-center justify-center text-amber-900 mb-4 shadow-inner border border-[#d4be9a]">
        <InfoIcon size={32} />
      </div>
      <h2 className="text-xl font-bold text-amber-950 mb-2 font-serif">{title}：修缮中</h2>
      <p className="text-sm text-amber-800/70 leading-relaxed max-w-xs">{desc}</p>
    </div>
  );
}

function QuickLink({ icon, label, isActive, onClick }) {
  return (
    <div
      onClick={onClick}
      className={`flex flex-col items-center justify-center cursor-pointer transition-all duration-200 py-1 touch-active ${isActive ? 'opacity-100' : 'opacity-60 hover:opacity-100 active:opacity-80'}`}
    >
      <div className={`w-10 h-10 md:w-12 md:h-12 rounded-full shadow-sm border flex items-center justify-center mb-1 md:mb-1.5 transition-colors ${isActive ? 'bg-red-900 text-[#f7f2e8] border-red-950' : 'bg-[#f4eadd] text-amber-900 border-[#d4be9a]'}`}>
        {icon}
      </div>
      <span className={`text-[10px] md:text-[11px] font-bold font-serif tracking-wider ${isActive ? 'text-red-900' : 'text-amber-900'}`}>{label}</span>
    </div>
  );
}

function TabBarItem({ icon, label, isActive, onClick }) {
  return (
    <button
      onClick={onClick}
      className={`flex flex-col items-center justify-center w-full py-2 md:py-3 transition-colors duration-200 touch-active no-select ${isActive ? 'text-red-900' : 'text-amber-900/60 hover:text-amber-900 active:text-amber-800'}`}
    >
      <div className={`mb-0.5 md:mb-1 transition-transform duration-200 ${isActive ? 'scale-110 drop-shadow-sm' : 'scale-100'}`}>
        {icon}
      </div>
      <span className="text-[11px] md:text-[12px] font-bold font-serif tracking-widest">{label}</span>
    </button>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
